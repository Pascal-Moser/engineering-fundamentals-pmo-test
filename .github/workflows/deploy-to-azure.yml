name: Deploy to Azure Web App

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Azure Login
        uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1
        with:
          creds: ${{ secrets.AZURE_RESOURCEGROUP_CONTRIBUTOR_SERVICEPRINICIPAL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@b733af8291ed8f84a5ac5b92f571c2e149f25047 # v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: lrengineering.azurecr.io/ipt-spins:latest 